<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="icon" type="image/x-icon" href="./img/favicon.ico">
    <title>Brescia Andrea Portfolio</title>
  </head>
  <body>
    <header>
      <nav class="mynav">
        <ul class="mymenu-nav">
          <li class="mymenu-nav__item">
            <a href="index.html" class="mymenu-nav__link"> Home </a>
          </li>
          <li class="mymenu-nav__item">
            <a href="about.html" class="mymenu-nav__link"> About Me </a>
          </li>
          <li class="mymenu-nav__item">
            <a href="projects.html" class="mymenu-nav__link"> My Projects </a>
          </li>
          <li class="mymenu-nav__item active">
            <a href="contact.html" class="mymenu-nav__link"> Contact Me </a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="contact text-white">
        <h2>Contact Me..</h2>

        <div class="contact__list">
          <div class="contact-item">
            <i class="fas fa-envelope"></i> Email
            <div class="my-text-secondary">franco.rossi@email.com</div>
          </div>
          <div class="contact-item">
            <i class="fas fa-mobile-alt"></i> Phone
            <div class="my-text-secondary">+39 (343) 297-4129</div>
          </div>
        </div>
        <form class="row g-3 form">
          <div class="col-md-6 ">
            <label for="inputEmail4" class="form-label">Email</label>
            <input type="email" class="form-control" id="inputEmail4" />
          </div>
          <div class="col-md-6">
            <label for="inputPassword4" class="form-label">Password</label>
            <input type="password" class="form-control" id="inputPassword4" />
          </div>
          <div class="col-12">
            <label for="inputAddress" class="form-label">Address</label>
            <input
              type="text"
              class="form-control"
              id="inputAddress"
              placeholder="1234 Main St"
            />
          </div>
          <div class="col-12">
            <label for="inputAddress2" class="form-label">Address 2</label>
            <input
              type="text"
              class="form-control"
              id="inputAddress2"
              placeholder="Apartment, studio, or floor"
            />
          </div>
          <div class="col-md-6">
            <label for="inputCity" class="form-label">City</label>
            <input type="text" class="form-control" id="inputCity" />
          </div>
          <div class="col-md-4">
            <label for="inputState" class="form-label">State</label>
            <select id="inputState" class="form-select">
              <option selected>Choose...</option>
              <option>...</option>
            </select>
          </div>
          <div class="col-md-2">
            <label for="inputZip" class="form-label">Zip</label>
            <input type="text" class="form-control" id="inputZip" />
          </div>
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="gridCheck" />
              <label class="form-check-label" for="gridCheck">
                Check me out
              </label>
            </div>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary">Sign in</button>
          </div>
        </form>
        <div class="social-icons">
          <a href="https://x.com">
            <i class="fab fa-x fa-2x"></i>
          </a>
          <a href="https://www.facebook.com">
            <i class="fab fa-facebook fa-2x"></i>
          </a>
          <a href="https://www.instagram.com">
            <i class="fab fa-instagram fa-2x"></i>
          </a>
          <a href="https://github.com/ShinAndre">
            <i class="fab fa-github fa-2x"></i>
          </a>
        </div>

        <footer class="footer">&copy; Copyright 2026</footer>
      </section>
    </main>

    <script
      src="https://kit.fontawesome.com/c4b494e0a4.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/main.js"></script>
  </body>
</html>
